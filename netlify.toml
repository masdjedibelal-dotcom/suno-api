[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium", "rebrowser-playwright-core"]
  included_files = ["node_modules/@sparticuz/chromium/**"]
  # Netlify Free: max 10s | Pro: max 26s (Support kann erhöhen). Generierung braucht Pro+.
  timeout = 26

[build.environment]
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  BROWSER = "chromium"
  BROWSER_HEADLESS = "true"
  BROWSER_DISABLE_GPU = "true"
  BROWSER_GHOST_CURSOR = "false"
  BROWSER_LOCALE = "en"
  NODE_VERSION = "20"
